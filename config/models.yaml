# config/models.yaml
# SINGLE SOURCE OF TRUTH for LLM usage in MERLIN
#
# Invariant:
# - LLMs are used ONLY for language + structure generation
# - Never for routing, tool selection, or execution decisions
#
# Supported providers: ollama | openrouter | gemini | huggingface
#
# API keys: set api_key here OR use environment variables:
#   OPENROUTER_API_KEY, GEMINI_API_KEY, HUGGINGFACE_API_KEY
# Config api_key takes priority over env var.

mission_compiler:
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.2
  max_tokens: 4096
  # ── Switch to Ollama ──
  # provider: ollama
  # model: mistral:7b-instruct
  # base_url: http://localhost:11434
  # ── Switch to Gemini ──
  # provider: gemini
  # model: gemini-2.0-flash
  # max_tokens: 2048
  # ── Switch to HuggingFace ──
  # provider: huggingface
  # model: mistralai/Mistral-7B-Instruct-v0.3

report_generator:
  #provider: openrouter
  #model: deepseek/deepseek-chat
  #temperature: 0.6
  #max_tokens: 4096
  provider: ollama
  model: llama3:8b
  base_url: http://localhost:11434
  temperature: 0.6
  max_tokens: 4096

clarifier:
  provider: ollama
  model: llama3:8b
  base_url: http://localhost:11434
  temperature: 0.1

cognitive_coordinator:
  # Bounded reasoning engine — pure reasoning, date math, knowledge,
  # and variable computation for mixed reasoning+action queries.
  # Phase 1: single LLM call, no loops.
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.3
  max_tokens: 2048
  # ── Switch to Ollama ──
  # provider: ollama
  # model: llama3:8b
  # base_url: http://localhost:11434
  # ── Switch to Gemini ──
  # provider: gemini
  # model: gemini-2.0-flash
  # max_tokens: 2048
  # ── Switch to HuggingFace ──
  # provider: huggingface
  # model: mistralai/Mistral-7B-Instruct-v0.3
