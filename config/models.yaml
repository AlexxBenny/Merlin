# config/models.yaml
# SINGLE SOURCE OF TRUTH for LLM usage in MERLIN
#
# Invariant:
# - LLMs are used ONLY for language + structure generation
# - Never for routing, tool selection, or execution decisions
# - Exception: recovery_reasoner diagnoses failure state (constrained
#   to GuardType enum, validated against WorldState — not planning)
#
# Supported providers: ollama | openrouter | gemini | huggingface
#
# API keys: set api_key here OR use environment variables:
#   OPENROUTER_API_KEY, GEMINI_API_KEY, HUGGINGFACE_API_KEY
# Config api_key takes priority over env var.
#
# max_tokens: ceiling for output generation (not prompt size).
# Set based on realistic output lengths — over-requesting wastes
# credit budget and can trigger 402 errors on metered APIs.

mission_compiler:
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.2
  max_tokens: 1024  # JSON plan: ~200-500 tokens
  # ── Switch to Ollama ──
  # provider: ollama
  # model: mistral:7b-instruct
  # base_url: http://localhost:11434
  # ── Switch to Gemini ──
  # provider: gemini
  # model: gemini-2.0-flash
  # max_tokens: 1024
  # ── Switch to HuggingFace ──
  # provider: huggingface
  # model: mistralai/Mistral-7B-Instruct-v0.3

report_generator:
  #provider: openrouter
  #model: deepseek/deepseek-chat
  #temperature: 0.6
  #max_tokens: 1024
  provider: ollama
  model: llama3:8b
  base_url: http://localhost:11434
  temperature: 0.6
  max_tokens: 1024  # Narration: ~100-300 tokens

clarifier:
  provider: ollama
  model: llama3:8b
  base_url: http://localhost:11434
  temperature: 0.1

cognitive_coordinator:
  # Bounded reasoning engine — pure reasoning, date math, knowledge,
  # and variable computation for mixed reasoning+action queries.
  # Phase 1: single LLM call, no loops.
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.3
  max_tokens: 512  # mode + trace: ~100-300 tokens
  # ── Switch to Ollama ──
  # provider: ollama
  # model: llama3:8b
  # base_url: http://localhost:11434
  # ── Switch to Gemini ──
  # provider: gemini
  # model: gemini-2.0-flash
  # max_tokens: 512
  # ── Switch to HuggingFace ──
  # provider: huggingface
  # model: mistralai/Mistral-7B-Instruct-v0.3

content_generator:
  # Used by reasoning.generate_text skill for content generation
  # within missions. Separate from report_generator (which formats
  # execution results — different purpose, different temperature).
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.7
  max_tokens: 4096  # User content: varies, keep high
  timeout: 30

speech_act_classifier:
  # Lightweight classifier — runs before routing on mission-eligible queries.
  # Classifies statement type: COMMAND, QUESTION, PREFERENCE, POLICY, etc.
  # Should be fast and cheap — low max_tokens, zero temperature.
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.0
  max_tokens: 64  # Single word output

browser_agent:
  # browser-use uses ChatGoogle (langchain) — NOT MERLIN's LLMClient.
  # This role configures which model to use for browser automation.
  # API key: set GOOGLE_BROWSER_AGENT_API_KEY in .env
  # The BrowserUseAdapter reads model name from here and creates
  # ChatGoogle directly, bypassing ModelRouter.
  model: gemini-2.5-flash

recovery_reasoner:
  # Constrained diagnostic for DecisionEngine (Step 2).
  # Output: {"state_type": "<GuardType>", "entity": "...", "cause": "..."}
  # NOT a planner — only identifies missing state conditions.
  # Output validated by _normalize_diagnosis() + WorldState check.
  provider: openrouter
  model: google/gemini-2.5-flash
  temperature: 0.0
  max_tokens: 128  # Single JSON object

