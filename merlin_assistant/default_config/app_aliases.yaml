# Application Aliases Configuration
# Maps semantic category names to canonical app_ids
# Used by EntityResolver for NL → app_id resolution
#
# Format: alias_term: canonical_app_id
# These are semantic aliases, not display names.
# Display names are handled by ApplicationRegistry name index.

