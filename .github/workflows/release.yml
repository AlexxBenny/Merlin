name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag version matches pyproject.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          import os

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:] if tag.startswith("v") else tag
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = data["project"]["version"]
          if actual != expected:
              raise SystemExit(
                  f"Tag version '{tag}' does not match pyproject version '{actual}'."
              )
          print(f"Version check passed: {actual}")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Run tests
        run: python -m pytest -q

      - name: Build package distributions
        run: python -m build

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  github-release:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
